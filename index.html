<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeClock 365</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f8f8f8; }
    canvas { display: block; width: 100vw; height: 100vh; }

    .hero {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      padding: 0 24px;
    }

    .hero-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-bottom: 22px;
    }

    .hero h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(42px, 7vw, 96px);
      font-weight: 400;
      color: #0d0d0d;
      line-height: 1.08;
      letter-spacing: -2px;
      margin: 0 0 20px;
    }

    .hero h1 em {
      font-style: italic;
      color: rgba(0,0,0,0.45);
    }

    .hero p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: clamp(15px, 1.8vw, 19px);
      color: rgba(0,0,0,0.45);
      max-width: 480px;
      line-height: 1.65;
      margin: 0 0 44px;
      font-weight: 400;
    }

    .btn-glass {
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 34px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #0d0d0d;
      text-decoration: none;
      border: 1.5px solid rgba(0,0,0,0.75);
      border-radius: 100px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 24px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-glass:hover {
      background: rgba(255,255,255,0.55);
      box-shadow: 0 4px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
      transform: translateY(-2px);
    }

    .btn-glass:active {
      transform: translateY(0);
    }

    .btn-arrow {
      width: 16px;
      height: 16px;
      opacity: 0.6;
      transition: transform 0.2s;
    }
    .btn-glass:hover .btn-arrow {
      transform: translateX(3px);
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hero">
  <div class="hero-label">Workforce Management</div>
  <h1>Control time.<br><em>Own the space.</em></h1>
  <p>Time tracking and door access in one system. Every entry is attendance — automatic, accurate, audit-ready.</p>
  <a href="door-access-control/" class="btn-glass">
    See How It Works
    <svg class="btn-arrow" viewBox="0 0 16 16" fill="none">
      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</div>
<script>
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");

  let W = canvas.width  = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const N   = 30000;
  const px  = new Float32Array(N);   // текущая x
  const py  = new Float32Array(N);   // текущая y
  const pvx = new Float32Array(N);   // скорость x
  const pvy = new Float32Array(N);   // скорость y
  const phx = new Float32Array(N);   // домашняя x (куда вернуться)
  const phy = new Float32Array(N);   // домашняя y

  // Мышь
  let mx = -9999, my = -9999, mActive = false;

  window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; mActive = true; });
  window.addEventListener("mouseleave", () => { mActive = false; });
  window.addEventListener("touchmove", e => {
    e.preventDefault();
    mx = e.touches[0].clientX; my = e.touches[0].clientY; mActive = true;
  }, { passive: false });
  window.addEventListener("touchend", () => { mActive = false; });
  window.addEventListener("resize", () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    init();
  });

  function init() {
    for (let i = 0; i < N; i++) {
      phx[i] = Math.random() * W;
      phy[i] = Math.random() * H;
      px[i]  = phx[i];
      py[i]  = phy[i];
      pvx[i] = 0;
      pvy[i] = 0;
    }
  }

  // ── Физика ──────────────────────────────────────────────────────────────────
  const REPEL_R  = 90;
  const REPEL_R2 = REPEL_R * REPEL_R;
  const REPEL_F  = 5;     // сила отталкивания — не слишком сильная
  const SPRING   = 0.018; // слабая пружина — нет перелёта
  const DAMP     = 0.96;  // высокое затухание — нет осцилляции
  const MAX_V    = 10;    // ограничение скорости

  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "rgba(20,20,20,0.85)";

    for (let i = 0; i < N; i++) {
      // 1. Мышка отталкивает
      if (mActive) {
        const dx = px[i] - mx;
        const dy = py[i] - my;
        const d2 = dx * dx + dy * dy;
        if (d2 < REPEL_R2 && d2 > 0.5) {
          const d  = Math.sqrt(d2);
          const t  = 1 - d / REPEL_R;     // 0..1 — сильнее у центра
          const f  = t * t * REPEL_F;
          pvx[i] += (dx / d) * f;         // вектор ОТ мышки
          pvy[i] += (dy / d) * f;
        }
      }

      // 2. Пружина тянет домой — слабо, без перелёта
      pvx[i] += (phx[i] - px[i]) * SPRING;
      pvy[i] += (phy[i] - py[i]) * SPRING;

      // 3. Затухание — гасит скорость, нет осцилляции
      pvx[i] *= DAMP;
      pvy[i] *= DAMP;

      // 4. Ограничение скорости — частицы не улетают
      const spd = pvx[i] * pvx[i] + pvy[i] * pvy[i];
      if (spd > MAX_V * MAX_V) {
        const s  = MAX_V / Math.sqrt(spd);
        pvx[i] *= s;
        pvy[i] *= s;
      }

      // 5. Позиция
      px[i] += pvx[i];
      py[i] += pvy[i];

      // 6. Рисуем точку
      ctx.fillRect(px[i] | 0, py[i] | 0, 1, 1);
    }
  }

  init();
  animate();
</script>
</body>
</html>
