<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Effect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #070b14;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    display: block;
  }

  .hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.18);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    animation: fade 3s ease-in-out infinite alternate;
  }

  @keyframes fade {
    from { opacity: 0.4; }
    to   { opacity: 0.1; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="hint">Move your mouse</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, particles;

const MOUSE       = { x: -9999, y: -9999 };
const COUNT       = 160;
const RADIUS      = 160;   // mouse influence zone
const REPEL       = 7;     // push strength
const SPRING      = 0.048; // return speed
const DAMP        = 0.80;  // velocity damping

// colour palette  blue → violet → cyan
const HUES = [200, 215, 230, 250, 270, 190];

class Dot {
  constructor() { this.spawn(); }

  spawn() {
    this.ox = Math.random() * W;
    this.oy = Math.random() * H;
    this.x  = this.ox;
    this.y  = this.oy;
    this.vx = 0;
    this.vy = 0;
    this.r     = 1.5 + Math.random() * 2;
    this.alpha = 0.25 + Math.random() * 0.45;
    this.hue   = HUES[Math.floor(Math.random() * HUES.length)];
    this.sat   = 70 + Math.random() * 25;
  }

  step() {
    // spring towards home
    this.vx += (this.ox - this.x) * SPRING;
    this.vy += (this.oy - this.y) * SPRING;

    // repel from mouse
    const dx = this.x - MOUSE.x;
    const dy = this.y - MOUSE.y;
    const d  = Math.hypot(dx, dy);
    if (d < RADIUS && d > 1) {
      const f = (1 - d / RADIUS) * REPEL;
      this.vx += (dx / d) * f * 2;
      this.vy += (dy / d) * f * 2;
    }

    this.vx *= DAMP;
    this.vy *= DAMP;
    this.x  += this.vx;
    this.y  += this.vy;
  }

  draw() {
    const speed = Math.hypot(this.vx, this.vy);
    const glow  = Math.min(speed / 4, 1);

    const r = this.r + glow * 5;
    const a = Math.min(this.alpha + glow * 0.5, 1);

    if (glow > 0.05) {
      const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 3);
      g.addColorStop(0, `hsla(${this.hue},${this.sat}%,75%,${a})`);
      g.addColorStop(1, `hsla(${this.hue},${this.sat}%,75%,0)`);
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = `hsla(${this.hue},${this.sat}%,68%,${a})`;
    }

    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLines() {
  const MAX = 100;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const d = Math.hypot(
        particles[i].x - particles[j].x,
        particles[i].y - particles[j].y
      );
      if (d < MAX) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(120,170,255,${(1 - d / MAX) * 0.1})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  }
}

function init() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  particles = Array.from({ length: COUNT }, () => new Dot());
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  drawLines();
  for (const p of particles) { p.step(); p.draw(); }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', init);

window.addEventListener('mousemove', e => {
  MOUSE.x = e.clientX;
  MOUSE.y = e.clientY;
});
window.addEventListener('mouseleave', () => {
  MOUSE.x = -9999;
  MOUSE.y = -9999;
});

window.addEventListener('touchmove', e => {
  e.preventDefault();
  MOUSE.x = e.touches[0].clientX;
  MOUSE.y = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchend', () => {
  MOUSE.x = -9999;
  MOUSE.y = -9999;
});

init();
loop();
</script>
</body>
</html>
