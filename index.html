<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Effect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas { display: block; }
  .hint {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(0,0,0,0.18);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    pointer-events: none;
    animation: fade 2.5s ease-in-out infinite alternate;
  }
  @keyframes fade {
    from { opacity: 0.5; }
    to   { opacity: 0.12; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">Move your mouse</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, particles;
const MOUSE   = { x: -9999, y: -9999 };

// Tune these
const COUNT   = 280;   // number of dots
const RADIUS  = 120;   // mouse influence zone px
const REPEL   = 5;     // push force
const SPRING  = 0.042; // return speed
const DAMP    = 0.78;  // velocity damping

class Dot {
  constructor() { this.spawn(); }

  spawn() {
    this.ox = Math.random() * W;
    this.oy = Math.random() * H;
    this.x  = this.ox;
    this.y  = this.oy;
    this.vx = 0;
    this.vy = 0;
    this.r     = 0.8 + Math.random() * 1.2;   // tiny dots
    this.alpha = 0.25 + Math.random() * 0.35;
    // dark grey to mid-grey
    const l = 120 + Math.floor(Math.random() * 80);
    this.color = `rgb(${l},${l},${l})`;
  }

  step() {
    // spring home
    this.vx += (this.ox - this.x) * SPRING;
    this.vy += (this.oy - this.y) * SPRING;

    // repel from mouse
    const dx = this.x - MOUSE.x;
    const dy = this.y - MOUSE.y;
    const d  = Math.hypot(dx, dy);
    if (d < RADIUS && d > 1) {
      const f = (1 - d / RADIUS) * REPEL;
      this.vx += (dx / d) * f * 2.2;
      this.vy += (dy / d) * f * 2.2;
    }

    this.vx *= DAMP;
    this.vy *= DAMP;
    this.x  += this.vx;
    this.y  += this.vy;
  }

  draw() {
    const speed = Math.hypot(this.vx, this.vy);
    const glow  = Math.min(speed / 5, 1);
    const r     = this.r + glow * 1.5;
    const a     = Math.min(this.alpha + glow * 0.3, 0.9);

    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace('rgb', 'rgba').replace(')', `,${a})`);
    ctx.fill();
  }
}

function drawLines() {
  const MAX = 80;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.hypot(dx, dy);
      if (d < MAX) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(160,160,160,${(1 - d / MAX) * 0.18})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function init() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  particles = Array.from({ length: COUNT }, () => new Dot());
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  drawLines();
  for (const p of particles) { p.step(); p.draw(); }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', init);

window.addEventListener('mousemove', e => {
  MOUSE.x = e.clientX;
  MOUSE.y = e.clientY;
});
window.addEventListener('mouseleave', () => {
  MOUSE.x = -9999;
  MOUSE.y = -9999;
});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  MOUSE.x = e.touches[0].clientX;
  MOUSE.y = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchend', () => {
  MOUSE.x = -9999;
  MOUSE.y = -9999;
});

init();
loop();
</script>
</body>
</html>
