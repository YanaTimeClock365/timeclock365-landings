<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particles</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f8f8f8; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");

  let W = canvas.width  = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  // ── Typed arrays — плотная память, быстрый loop ───────────────────────────
  const N   = 30000;
  const px  = new Float32Array(N);
  const py  = new Float32Array(N);
  const pvx = new Float32Array(N);
  const pvy = new Float32Array(N);
  const phx = new Float32Array(N);  // home x (куда возвращаться)
  const phy = new Float32Array(N);  // home y

  // Мышь
  let mx = -9999, my = -9999, mActive = false;

  window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; mActive = true; });
  window.addEventListener("mouseleave", () => { mActive = false; });
  window.addEventListener("touchmove", e => {
    e.preventDefault();
    mx = e.touches[0].clientX; my = e.touches[0].clientY; mActive = true;
  }, { passive: false });
  window.addEventListener("touchend", () => { mActive = false; });

  function init() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    for (let i = 0; i < N; i++) {
      px[i] = phx[i] = Math.random() * W;
      py[i] = phy[i] = Math.random() * H;
      pvx[i] = 0;
      pvy[i] = 0;
    }
  }

  window.addEventListener("resize", init);

  // ── Параметры ──────────────────────────────────────────────────────────────
  const REPEL_R  = 90;    // радиус отталкивания мышки
  const REPEL_R2 = REPEL_R * REPEL_R;
  const REPEL_F  = 8;     // сила отталкивания
  const SPRING   = 0.035; // скорость возврата на место
  const DAMP     = 0.87;  // затухание скорости

  // ── Loop ───────────────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#111";

    for (let i = 0; i < N; i++) {
      // 1. Возврат на домашнюю позицию (spring)
      pvx[i] += (phx[i] - px[i]) * SPRING;
      pvy[i] += (phy[i] - py[i]) * SPRING;

      // 2. Отталкивание от мышки
      if (mActive) {
        const dx  = px[i] - mx;
        const dy  = py[i] - my;
        const d2  = dx * dx + dy * dy;
        if (d2 < REPEL_R2 && d2 > 0.01) {
          const d    = Math.sqrt(d2);
          const t    = 1 - d / REPEL_R;          // 0..1, сильнее у центра
          const f    = t * t * REPEL_F / d;
          pvx[i]    += dx * f;
          pvy[i]    += dy * f;
        }
      }

      // 3. Затухание
      pvx[i] *= DAMP;
      pvy[i] *= DAMP;

      // 4. Движение
      px[i] += pvx[i];
      py[i] += pvy[i];

      // 5. Точка 1×1 px
      ctx.fillRect(px[i] | 0, py[i] | 0, 1, 1);
    }
  }

  init();
  animate();
</script>
</body>
</html>
